server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/comm_timeline
    username: comm_user
    password: comm_pass
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

cors:
  allowed-origins: http://localhost:3000,http://localhost:5173
