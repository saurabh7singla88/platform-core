services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: comm_timeline
      POSTGRES_USER: comm_user
      POSTGRES_PASSWORD: comm_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comm_user -d comm_timeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/comm_timeline
      SPRING_DATASOURCE_USERNAME: comm_user
      SPRING_DATASOURCE_PASSWORD: comm_pass
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  widget:
    build: ./widget
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
